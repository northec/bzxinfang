services:
  - type: web
    name: bzxinfang-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api/stats/dashboard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bzxinfang-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  - name: bzxinfang-db
    plan: free
    databaseName: bzxinfang
    ipAllowList: []
